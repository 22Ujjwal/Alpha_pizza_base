<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Pizza Company Database</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Alpha Pizza Base</h1>
        <p class="header-subtitle">Menu Interface</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="menu.html" class="active">Menu</a>
        <a href="orders.html">Orders</a>
        <a href="inventory-management.html">Inventory Management</a>
        <a href="employee-management.html">Employee Management</a>
    </nav>

    <!-- Main Content -->
    <div class="container">

        <div class="search-bar">
            <p class="header-subtitle">Currently logged in as: Customer1</p>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">Switch User</button>            
        </div>

        <button class="btn btn-primary" onclick="window.location.href='cart.html'">View Cart</button>

        <!-- Tab Navigation -->
        <div class="tabs" id="category-tabs"></div>

    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Alpha Pizza Base Database System.</p>
    </footer>

   <script>
        function switchTab(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            const targetTab = document.getElementById(tabName);
            if (targetTab) {targetTab.classList.add('active');}
            evt.currentTarget.classList.add('active');
        }

        async function loadDynamicCategories() {
            try {
                // 1. Fetch categories from backend
                const response = await fetch('./api/inventory.php?action=categories');
                const payload = await response.json();
                
                if (!payload.success) throw new Error(payload.message);

                const tabsContainer = document.getElementById('category-tabs');
                tabsContainer.innerHTML = '';
                const mainContent = document.querySelector('.container');

                // Extract categories array safely
                const categoriesArray = payload.data?.categories || payload.categories || [];

                categoriesArray.forEach((cat, index) => {
                    const tabId = `category-${cat.Category.replace(/\s+/g, '-').toLowerCase()}`;    

                    // Create Tab Button
                    const btn = document.createElement('button');
                    btn.className = 'tab-button';
                    if (index === 0) btn.classList.add('active'); 
                    btn.textContent = cat.Category;
                    tabsContainer.appendChild(btn);

                    // Create Content Container
                    const contentDiv = document.createElement('div');
                    contentDiv.id = tabId;
                    contentDiv.className = 'tab-content';
                    if (index === 0) contentDiv.classList.add('active'); 
                    mainContent.appendChild(contentDiv);

                    // Attach Click Event
                    btn.onclick = async (event) => {
                        switchTab(event, tabId); 
                        
                        const container = document.getElementById(tabId);
                        container.innerHTML = `<p style="padding:20px;">Loading items for ${cat.Category}...</p>`;
                        
                        try {
                            const itemResponse = await fetch(`./api/inventory.php?action=search&search=${encodeURIComponent(cat.Category)}`);
                            const itemPayload = await itemResponse.json();

                            const itemsArray = itemPayload.data?.items || itemPayload.items || [];
                            
                            if (itemsArray.length === 0) {
                                container.innerHTML = `<p style="padding: 20px;">No items found in this category.</p>`;
                                return;
                            }

                            // Fetch ingredients and build cards
                            const itemsHtmlPromises = itemsArray.map(async (item) => {
                                let ingredientsText = "Loading...";
                                try {
                                    const ingResponse = await fetch(`./api/get_ingredients.php?id=${item.ItemID}`);
                                    ingredientsText = await ingResponse.text(); 
                                } catch (e) {
                                    ingredientsText = "Failed to load";
                                }

                                return `
                                    <div class="dashboard-card">
                                        <form onsubmit="addToCart(event, '${item.ItemID}', '${item.ItemName}', ${item.Price}, '${ingredientsText}')">
                                            <h3>${item.ItemName}</h3>
                                            <p><i>$${Number(item.Price).toFixed(2)}</i></p>
                                            <h4>Ingredients:</h4>
                                            <p>${ingredientsText}</p> 
                                            <input type="hidden" name="item" value="${item.ItemName}">
                                            <input type="hidden" name="itemId" value="${item.ItemID}">
                                            
                                            <div class='addToCartButton'>
                                                <button class="btn btn-primary" type="submit" style="width: 100%;"> Add to cart </button>
                                                
                                                <div id="cart-msg-${item.ItemID}" style="color: #28a745; font-size: 0.9rem; margin-top: 8px; font-weight: bold; text-align: center; height: 1.2rem;"></div>
                                            </div>
                                        </form>
                                    </div>
                                `;
                            });

                            // Wait for all ingredient requests to finish, then inject HTML
                            const itemsHtmlArray = await Promise.all(itemsHtmlPromises);
                            container.innerHTML = `<div class="dashboard-grid">${itemsHtmlArray.join('')}</div>`;

                        } catch (error) {
                            container.innerHTML = `<p style="color:red; padding: 20px;">Error loading items: ${error.message}</p>`;
                        }
                    };
                });

                // OUTSIDE THE LOOP: Auto-click the first tab after everything is built
                const firstButton = tabsContainer.querySelector('.tab-button');
                if (firstButton) {
                    firstButton.click();
                }

            } catch (error) {
                console.error("Failed to load categories:", error);
            }
        }

        // Call the function when the page loads
        document.addEventListener('DOMContentLoaded', loadDynamicCategories);

        function addToCart(event, id, name, price, ingredients) {
            event.preventDefault(); // Stops the page from redirecting

            // 1. Open the backpack
            let cart = JSON.parse(localStorage.getItem('alphaPizzaCart')) || [];

            // 2. Add or update the item
            let existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1; 
            } else {
                cart.push({ id, name, price, ingredients, quantity: 1 });
            }

            // 3. Save the backpack
            localStorage.setItem('alphaPizzaCart', JSON.stringify(cart));
            
            // --- NEW: Inline Success Message ---
            
            // Find the specific message box for the item we just clicked
            const messageBox = document.getElementById(`cart-msg-${id}`);
            
            if (messageBox) {
                // Display the text
                messageBox.innerText = "✓ Added to cart!";
                
                // Set a timer to erase the text after 2.5 seconds (2500 milliseconds)
                setTimeout(() => {
                    messageBox.innerText = "";
                }, 2500);
            }
        }
    </script>

</body>
</html>
